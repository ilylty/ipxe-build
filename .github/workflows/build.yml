name: Build Custom iPXE with GUI

# 触发条件：手动触发 (支持自定义标签名)
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release 标签名 (例如: v1.0.0-gui)'
        required: true
        default: 'v1.0.0-gui'

# 赋予 Action 读写权限，以便能够创建 Release 页面
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 安装编译依赖环境
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential liblzma-dev

      - name: 2. 拉取官方 iPXE 最新源码
        run: |
          git clone https://github.com/ipxe/ipxe.git .

      - name: 3. 自动注入配置 (开启图形化及图片支持)
        run: |
          mkdir -p src/config/local/
          
          # 开启控制台命令和 PNG/JPEG 图片格式支持
          cat <<EOF > src/config/local/general.h
          #define CONSOLE_CMD          /* 开启 console 控制台命令 */
          #define CONSOLE_FRAMEBUFFER  /* 开启 帧缓冲支持 */
          #define IMAGE_PNG            /* 开启 PNG 图片解析 */
          #define IMAGE_JPEG           /* 开启 JPEG 图片解析 */
          EOF

          # 开启高分辨率帧缓冲 (BIOS 的 VESA 模式 和 UEFI 的 GOP 模式)
          cat <<EOF > src/config/local/console.h
          #define CONSOLE_VESAFB       /* BIOS 高清分辨率支持 */
          #define CONSOLE_EFIFB        /* UEFI 高清分辨率支持 */
          EOF

      - name: 4. 编译传统 BIOS 固件 (undionly.kpxe)
        run: |
          cd src
          make bin/undionly.kpxe -j$(nproc)

      - name: 5. 编译 UEFI 固件 (ipxe.efi)
        run: |
          cd src
          make bin-x86_64-efi/ipxe.efi -j$(nproc)

      - name: 6. 创建 Release 并上传编译好的固件
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: Custom iPXE Release (${{ github.event.inputs.tag_name }})
          body: |
            ## 自定义 iPXE 固件自动编译完成 🎉
            
            **已集成的核心功能：**
            - ✅ `console` 命令支持 (可设置背景)
            - ✅ PNG 和 JPEG 格式背景图片解析支持
            - ✅ 高分辨率图形缓冲 (VESA & EFI)
            
            下载下方的 `undionly.kpxe` 和 `ipxe.efi`，替换掉你 TFTP 服务器上的同名文件即可！
          draft: false
          prerelease: false
          files: |
            src/bin/undionly.kpxe
            src/bin-x86_64-efi/ipxe.efi
